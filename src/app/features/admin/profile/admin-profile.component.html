<div class="profile-container reveal">
  <header class="profile-header">
    <div class="header-content">
      <div class="profile-badge">System Administration</div>
      <h1 class="header-title">Account Settings</h1>
      <p class="header-subtitle">Manage your personal details and administrative credentials</p>
    </div>
    
    <div class="header-actions">
      <button class="btn-save" (click)="onSave()" [disabled]="saving()">
        <span *ngIf="!saving()">Update Profile</span>
        <span *ngIf="saving()" class="spinner"></span>
      </button>
    </div>
  </header>

  <div class="profile-grid">
    <div class="grid-left">
      <div class="card security-card">
        <div class="user-avatar-large">
          <img [src]="auth.currentUser()?.profilePictureUrl || 'assets/default-admin.png'" alt="Admin Avatar">
        </div>
        <div class="user-info">
          <h3>{{ profile()?.fullName || 'System Admin' }}</h3>
          <p>{{ profile()?.email }}</p>
        </div>
        
        <div class="security-status">
          <div class="status-item">
            <i class="fa-solid fa-shield-check"></i>
            <span>Verified Admin Account</span>
          </div>
        </div>
      </div>
    </div>

    <div class="grid-right">
      <form [formGroup]="form" class="profile-form">
        <div class="card section-card">
          <h3 class="card-title"><i class="fa-solid fa-user-gear"></i> Personal Details</h3>
          
          <div class="form-grid">
            <div class="form-group full-width">
              <label>Full Name</label>
              <div class="input-wrapper">
                <i class="fa-solid fa-id-card"></i>
                <input type="text" formControlName="fullName" placeholder="Your full name">
              </div>
            </div>

            <div class="form-group">
              <label>Email Address (Primary)</label>
              <div class="input-wrapper disabled">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" formControlName="email">
              </div>
            </div>

            <div class="form-group">
              <label>Phone Number</label>
              <div class="input-wrapper">
                <i class="fa-solid fa-phone"></i>
                <input type="text" formControlName="phoneNumber" placeholder="+1 (000) 000-0000">
              </div>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
