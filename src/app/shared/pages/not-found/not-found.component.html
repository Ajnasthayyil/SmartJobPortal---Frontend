<div class="not-found-wrapper reveal">
    <div class="glow-sphere"></div>

    <div class="content-box">
        <div class="error-code">404</div>
        <div class="status-badge">OUTSIDE MISSION PARAMETERS</div>

        <h1 class="title">Path <span>Not Found</span></h1>
        <p class="description">
            The coordinates you provided do not exist within our talent ecosystem.
            The resource may have been relocated or archived.
        </p>

        <div class="action-grid">
            <button class="btn-primary" routerLink="/">
                <i class="fa-solid fa-house"></i>
                Return to Base
            </button>
            <button class="btn-secondary" (click)="goBack()">
                <i class="fa-solid fa-arrow-left"></i>
                Previous Sector
            </button>
        </div>

        <div class="security-note">
            <i class="fa-solid fa-shield-halved"></i>
            SECURE ACCESS MONITORED
        </div>
    </div>

    <div class="footer-minimal">
        TalEx AI-Powered Talent Ecosystem &copy; 2026
    </div>
</div>
