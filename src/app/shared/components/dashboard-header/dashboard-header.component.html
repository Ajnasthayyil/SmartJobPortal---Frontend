<div class="dash-header-container">
  <header class="dash-header">
    <!-- Left Section: Mobile menu toggle + Logo + Greeting -->
    <div class="header-left">
      <button class="mobile-menu-toggle" 
              (click)="sidebarService.toggleMobile()" 
              aria-label="Toggle Menu">
        <i class="fa-solid" [class.fa-bars]="!sidebarService.isOpenMobile()" [class.fa-xmark]="sidebarService.isOpenMobile()"></i>
      </button>
    </div>

    <!-- Right Section: Search + Chat + Bell + Profile Dropdown -->
    <div class="header-right">
      <!-- Search Bar -->
      <form class="search-bar" (submit)="onSearch(searchInput.value, $event)">
        <input #searchInput type="text" placeholder="Search..." aria-label="Search">
        <button type="submit" class="search-btn" aria-label="Search Submit">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </form>

      <!-- Community/Chat Button -->
      <button class="icon-btn chat-btn" title="Community Feed" routerLink="/feed" routerLinkActive="active">
        <i class="fa-regular fa-comment-dots"></i>
        <span class="notification-dot"></span>
      </button>

      <!-- Notifications -->
      <app-notification-bell *ngIf="authService.currentUser()?.role !== 'Admin'"></app-notification-bell>

      <!-- Profile Dropdown Trigger -->
      <div class="profile-dropdown">
        <div class="profile-btn" (click)="toggleDropdown()">
          <div class="avatar">
            <img [src]="authService.currentUser()?.profilePictureUrl || 'assets/images/default-avatar.png'" 
                 alt="Avatar" class="avatar-img" 
                 *ngIf="authService.currentUser()?.profilePictureUrl">
            <span *ngIf="!authService.currentUser()?.profilePictureUrl">
              {{ authService.currentUser()?.fullName?.charAt(0) || 'U' }}
            </span>
          </div>
          <div class="user-meta">
            <span class="name">{{ authService.currentUser()?.fullName || 'User' }}</span>
            <span class="role">{{ authService.currentUser()?.role || 'Candidate' }}</span>
          </div>
          <i class="fa-solid fa-chevron-down chevron"></i>
        </div>

        <!-- Dropdown Menu -->
        <div class="dropdown-menu" *ngIf="isDropdownOpen">
          <a [routerLink]="getProfileUrl()" class="menu-item">
            <i class="fa-solid fa-user"></i> My Profile
          </a>
         
          <button (click)="logout()" class="menu-item logout">
            <i class="fa-solid fa-right-from-bracket"></i> Sign Out
          </button>
        </div>
      </div>
    </div>
  </header>
</div>
