<div class="dash-header-container">
  <header class="dash-header">
    <div class="logo-wrapper" routerLink="/">
      <div class="logo">
        <div class="logo-text-group">Tal<span>Ex</span></div>
      </div>
      <span class="logo-subtitle">Where Talent Meets Opportunity</span>
    </div>

    <div class="header-right">
      <!-- Search Button -->
      <button class="icon-btn" title="Search">
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>

      <!-- Notifications -->
      <app-notification-bell *ngIf="authService.currentUser()?.role !== 'Admin'"></app-notification-bell>

      <!-- Profile Dropdown Trigger -->
      <div class="profile-dropdown">
        <div class="profile-btn" (click)="toggleDropdown()">
          <div class="avatar">
            <img [src]="authService.currentUser()?.profilePictureUrl || 'assets/images/default-avatar.png'" 
                 alt="Avatar" class="avatar-img" 
                 *ngIf="authService.currentUser()?.profilePictureUrl">
            <span *ngIf="!authService.currentUser()?.profilePictureUrl">
              {{ authService.currentUser()?.fullName?.charAt(0) || 'U' }}
            </span>
          </div>
          <div class="user-meta">
            <span class="name">{{ authService.currentUser()?.fullName || 'User' }}</span>
            <span class="role">{{ authService.currentUser()?.role || 'Candidate' }}</span>
          </div>
          <i class="fa-solid fa-chevron-down chevron"></i>
        </div>

        <!-- Dropdown Menu -->
        <div class="dropdown-menu" *ngIf="isDropdownOpen">
          <a [routerLink]="getProfileUrl()" class="menu-item">
            <i class="fa-solid fa-user"></i> My Profile
          </a>
         
          <button (click)="logout()" class="menu-item logout">
            <i class="fa-solid fa-right-from-bracket"></i> Sign Out
          </button>
        </div>
      </div>
    </div>
  </header>
</div>
