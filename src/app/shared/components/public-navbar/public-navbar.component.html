<nav class="public-nav">
  <div class="nav-inner">
    
    <!-- Left: Logo -->
    <a routerLink="/" class="logo">
      <div class="logo-text-group">
        <span class="logo-tal">Tal</span><span class="logo-ex">Ex</span>
      </div>
    </a>

    <!-- Center: Navigation Links -->
    <div class="nav-pill">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
      <a routerLink="/jobs" routerLinkActive="active">Find Jobs</a>
      <a routerLink="/courses" routerLinkActive="active">Career Tips</a>
      <a routerLink="/companies" routerLinkActive="active">Companies</a>
      <a routerLink="/feed" routerLinkActive="active">Community</a>
    </div>

    <!-- Right: User Session / CTA -->
    <div class="nav-right">
      
      <!-- Logged In State -->
      <ng-container *ngIf="auth.isLoggedIn()">
        <app-notification-bell></app-notification-bell>
        
        <div class="user-session" (click)="goToDashboard()">
          <span class="user-name hide-mobile">{{ auth.currentUser()?.fullName }}</span>
          <div class="avatar-circle">
            {{ getUserInitials() }}
          </div>
        </div>

        <button class="logout-btn hide-mobile" (click)="logout()">
          <i class="fa-solid fa-power-off"></i>
        </button>
      </ng-container>

      <!-- Logged Out State -->
      <ng-container *ngIf="!auth.isLoggedIn()">
        <a routerLink="/login" class="btn-login-text hide-mobile">Log in</a>
        <a routerLink="/register" class="btn-register-cta hide-mobile">Create an account</a>
      </ng-container>

      <!-- Mobile Toggle -->
      <button class="mobile-btn" (click)="mobileOpen.set(!mobileOpen())">
        <svg *ngIf="!mobileOpen()" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
        <svg *ngIf="mobileOpen()" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M18 6L6 18M6 6l12 12"></path>
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile Menu Dropdown -->
  <div class="mobile-menu" *ngIf="mobileOpen()">
    <a routerLink="/" (click)="mobileOpen.set(false)">Home</a>
    <a routerLink="/jobs" (click)="mobileOpen.set(false)">Jobs</a>
    <a routerLink="/companies" (click)="mobileOpen.set(false)">Companies</a>
    <a routerLink="/feed" (click)="mobileOpen.set(false)">Community</a>
    
    <ng-container *ngIf="auth.isLoggedIn()">
      <hr style="border: 0; border-top: 1px solid #f1f5f9; margin: 10px 0;">
      <a (click)="goToDashboard(); mobileOpen.set(false)">Dashboard</a>
      <a (click)="logout(); mobileOpen.set(false)" style="color: #ef4444;">Logout</a>
    </ng-container>

    <ng-container *ngIf="!auth.isLoggedIn()">
      <hr style="border: 0; border-top: 1px solid #f1f5f9; margin: 10px 0;">
      <a routerLink="/login" (click)="mobileOpen.set(false)">Log in</a>
      <a routerLink="/register" (click)="mobileOpen.set(false)" style="color: #003d4c; font-weight: 700;">Create an account</a>
    </ng-container>
  </div>
</nav>
