<aside class="sidebar-wrapper" [class.mobile-open]="sidebarService.isOpenMobile()">
  <div class="sidebar-logo-container" routerLink="/" (click)="sidebarService.setMobileOpen(false)">
    <div class="sidebar-logo">
      <img src="assets/logo.png" alt="TalEx Logo" class="logo-img">
      <div class="logo-text-group">
        <span class="logo-text" style="color: #0f172a">Tal</span>
        <span class="logo-text" style="color: #10b981">Ex</span>
      </div>
    </div>
    <span class="logo-subtitle">Where Talent Meets Opportunity</span>
  </div>
  
  <div class="sidebar-content">
    <div class="nav-group" *ngFor="let group of links">
      <h3 class="group-title">{{ group.group }}</h3>
      
      <div class="nav-items">
        <a *ngFor="let item of group.items"
           [routerLink]="item.path"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{exact: true}"
           class="nav-link"
           (click)="sidebarService.setMobileOpen(false)">
          <i [class]="'nav-icon ' + item.iconClass"></i>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      </div>
    </div>
  </div>

  <div class="sidebar-footer">
    <button class="logout-btn" (click)="logout(); sidebarService.setMobileOpen(false)">
      <i class="fa-solid fa-power-off nav-icon"></i>
      <span class="nav-label">Logout</span>
    </button>
  </div>
</aside>
