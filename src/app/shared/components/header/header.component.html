<div class="navbar-container">
  <nav class="navbar">
    <!-- Logo -->
    <div class="logo" routerLink="/">Tal<span>Ex</span></div>
    
    <!-- Center Links Pill (Desktop) -->
    <div class="nav-center">
      <ul class="nav-links">
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">HOME</a></li>
        <li><a routerLink="/candidate/job-search" routerLinkActive="active">JOBS</a></li>
        <li><a routerLink="/companies" routerLinkActive="active">COMPANIES</a></li>
        <li><a routerLink="/courses" routerLinkActive="active">COURSES</a></li>
      </ul>
    </div>

    <!-- Right Actions -->
    <div class="nav-right">
      <button class="btn-login hide-mobile" routerLink="/login">LOGIN</button>
      
      <!-- Mobile Menu Toggle -->
      <button class="menu-toggle" (click)="toggleMenu()">
        <svg *ngIf="!isMenuOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
        <svg *ngIf="isMenuOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"></path>
        </svg>
      </button>
    </div>
  </nav>

  <!-- Mobile Menu Overlay -->
  <div class="mobile-menu" [class.open]="isMenuOpen">
    <ul class="mobile-nav-links">
      <li><a routerLink="/" (click)="closeMenu()">HOME</a></li>
      <li><a routerLink="/candidate/job-search" (click)="closeMenu()">JOBS</a></li>
      <li><a routerLink="/companies" (click)="closeMenu()">COMPANIES</a></li>
      <li><a routerLink="/courses" (click)="closeMenu()">COURSES</a></li>
      <li><a routerLink="/login" class="mobile-login" (click)="closeMenu()">LOGIN</a></li>
    </ul>
  </div>
</div>
